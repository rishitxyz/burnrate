name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ------------------------------------------------------------------
  # Docker: multi-arch image → Docker Hub
  # ------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/burnrate:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/burnrate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/burnrate
          short-description: "Privacy-first, local-only credit card spend analytics. No cloud, no tracking."
          readme-filepath: ./DOCKERHUB.md

  # ------------------------------------------------------------------
  # macOS ARM (Apple Silicon): Tauri app → .dmg
  # ------------------------------------------------------------------
  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-neopop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Force pure-Python charset_normalizer
        run: |
          pip uninstall -y charset-normalizer || true
          pip install charset-normalizer --no-binary :all:

      - name: Install frontend dependencies
        working-directory: frontend-neopop
        run: npm ci

      - name: Build frontend
        working-directory: frontend-neopop
        run: npm run build

      - name: Generate app icons from SVG
        run: |
          bash scripts/generate-icons.sh

      - name: Build Python sidecar
        env:
          PYTHONPATH: .
        run: |
          TRIPLE=$(rustc -vV | grep host | awk '{print $2}')
          pyinstaller \
            --name burnrate-server \
            --onefile \
            --noconfirm \
            --paths . \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --collect-all backend \
            --collect-all pdfplumber \
            --collect-all charset_normalizer \
            scripts/launch.py
          mkdir -p src-tauri/binaries
          cp "dist/burnrate-server" "src-tauri/binaries/burnrate-server-${TRIPLE}"
          codesign --force --sign - "src-tauri/binaries/burnrate-server-${TRIPLE}"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: CI=false cargo tauri build

      - name: Prepare DMG for distribution
        run: |
          DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG_PATH" ]; then
            codesign --remove-signature "$DMG_PATH" 2>/dev/null || true
            xattr -cr "$DMG_PATH" 2>/dev/null || true
          fi

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Burnrate-macOS-arm64
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # ------------------------------------------------------------------
  # macOS Intel (x86_64): Tauri app → .dmg
  # ------------------------------------------------------------------
  build-macos-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-neopop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Force pure-Python charset_normalizer
        run: |
          pip uninstall -y charset-normalizer || true
          pip install charset-normalizer --no-binary :all:

      - name: Install frontend dependencies
        working-directory: frontend-neopop
        run: npm ci

      - name: Build frontend
        working-directory: frontend-neopop
        run: npm run build

      - name: Generate app icons from SVG
        run: |
          bash scripts/generate-icons.sh

      - name: Build Python sidecar
        env:
          PYTHONPATH: .
        run: |
          TRIPLE=$(rustc -vV | grep host | awk '{print $2}')
          pyinstaller \
            --name burnrate-server \
            --onefile \
            --noconfirm \
            --paths . \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --collect-all backend \
            --collect-all pdfplumber \
            --collect-all charset_normalizer \
            scripts/launch.py
          mkdir -p src-tauri/binaries
          cp "dist/burnrate-server" "src-tauri/binaries/burnrate-server-${TRIPLE}"
          codesign --force --sign - "src-tauri/binaries/burnrate-server-${TRIPLE}"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: CI=false cargo tauri build

      - name: Prepare DMG for distribution
        run: |
          DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG_PATH" ]; then
            codesign --remove-signature "$DMG_PATH" 2>/dev/null || true
            xattr -cr "$DMG_PATH" 2>/dev/null || true
          fi

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Burnrate-macOS-x86_64
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # ------------------------------------------------------------------
  # Windows: PyInstaller + Inno Setup → .exe installer
  # ------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-neopop/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install frontend dependencies
        working-directory: frontend-neopop
        run: npm ci

      - name: Build frontend
        working-directory: frontend-neopop
        run: npm run build

      - name: Generate app icons from SVG
        run: |
          cd frontend-neopop
          npm install --save-dev @resvg/resvg-js
          node ../scripts/generate-icons.mjs

      - name: Build Windows executable
        env:
          PYTHONPATH: .
        run: |
          pyinstaller `
            --name Burnrate `
            --onedir `
            --noconfirm `
            --icon "src-tauri/icons/icon.ico" `
            --add-data "frontend-neopop/dist;static" `
            --paths . `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --collect-all backend `
            --collect-all pdfplumber `
            --collect-all charset_normalizer `
            scripts/launch.py

      - name: Copy icon into dist for installer
        run: Copy-Item "src-tauri/icons/icon.ico" "dist/Burnrate/icon.ico"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Inno Setup installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\burnrate.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Burnrate-Windows
          path: dist/Burnrate-Setup.exe

  # ------------------------------------------------------------------
  # GitHub Release: collect artifacts and publish
  # ------------------------------------------------------------------
  release:
    needs: [build-macos-arm, build-macos-intel, build-windows]
    if: always() && (needs.build-macos-arm.result == 'success' || needs.build-macos-intel.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS ARM artifact
        if: needs.build-macos-arm.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: Burnrate-macOS-arm64
          path: artifacts/macos-arm64

      - name: Download macOS Intel artifact
        if: needs.build-macos-intel.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: Burnrate-macOS-x86_64
          path: artifacts/macos-x86_64

      - name: Download Windows artifact
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: Burnrate-Windows
          path: artifacts/windows

      - name: Rename artifacts for clarity
        run: |
          for f in artifacts/macos-arm64/*.dmg; do
            [ -f "$f" ] && mv "$f" "artifacts/macos-arm64/Burnrate_aarch64.dmg" || true
          done
          for f in artifacts/macos-x86_64/*.dmg; do
            [ -f "$f" ] && mv "$f" "artifacts/macos-x86_64/Burnrate_x86_64.dmg" || true
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/macos-arm64/*.dmg
            artifacts/macos-x86_64/*.dmg
            artifacts/windows/*.exe

      - name: Update Homebrew Formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: pratik1235/homebrew-burnrate
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping Homebrew Formula update"
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_URL="https://github.com/pratik1235/burnrate/archive/${GITHUB_REF_NAME}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | sha256sum | awk '{print $1}')
          echo "Version: ${VERSION}"
          echo "SHA256:  ${SHA256}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" _tap
          cd _tap

          # Read the template from the burnrate repo and fill in version + SHA
          cp "$GITHUB_WORKSPACE/HomebrewFormula/burnrate.rb" Formula/burnrate.rb
          sed -i "s|url \"https://github.com/pratik1235/burnrate/archive/v.*\.tar\.gz\"|url \"${TARBALL_URL}\"|" Formula/burnrate.rb
          sed -i "s|sha256 \"PLACEHOLDER\"|sha256 \"${SHA256}\"|" Formula/burnrate.rb
          sed -i "s|sha256 \"[a-f0-9]\{64\}\"|sha256 \"${SHA256}\"|" Formula/burnrate.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/burnrate.rb
          git diff --cached --quiet && echo "No changes to Formula" && exit 0
          git commit -m "Update burnrate to ${VERSION}"
          git push
          echo "Homebrew Formula updated to ${VERSION}"
