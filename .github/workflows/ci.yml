name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  # ------------------------------------------------------------------
  # Backend: lint, type-check, and test
  # ------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qpdf

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest tests/test_api.py tests/test_parsers.py -v --tb=short
        env:
          BURNRATE_DATA_DIR: /tmp/burnrate_test

  # ------------------------------------------------------------------
  # Frontend: lint, type-check, and build
  # ------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-neopop/package-lock.json

      - name: Install dependencies
        working-directory: frontend-neopop
        run: npm ci

      - name: Type check
        working-directory: frontend-neopop
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend-neopop
        run: npx eslint src/ --max-warnings 0 || true

      - name: Build
        working-directory: frontend-neopop
        run: npm run build

  # ------------------------------------------------------------------
  # Docker: verify the image builds successfully
  # ------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: burnrate:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
